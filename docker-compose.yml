version: "3.9"

services:
  energy-dashboard:
    image: ghcr.io/${GITHUB_USERNAME:-your-username}/kami-energy-dashboard:latest
    # 如需本地构建，注释上面 image 行，取消注释下面两行：
    # build: .
    container_name: kami-energy-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - energy_data:/data
    environment:
      - DB_PATH=/data/dashboard.db
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  energy_data:
    driver: local
