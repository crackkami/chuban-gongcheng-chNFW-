# 本地构建版本：docker-compose -f docker-compose.build.yml up -d
version: "3.9"

services:
  energy-dashboard:
    build: .
    container_name: kami-energy-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - energy_data:/data
    environment:
      - DB_PATH=/data/dashboard.db

volumes:
  energy_data:
    driver: local
